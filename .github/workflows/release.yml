# Build GameFence.exe on Windows and attach it to the GitHub Release for the pushed tag.
# Usage: git tag v1.0.0 && git push origin v1.0.0

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies (runtime + PyInstaller)
        run: python -m pip install --upgrade pip && python -m pip install -r requirements-build.txt

      - name: Build executable
        run: python -m PyInstaller --noconfirm --clean GameFence.spec

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/GameFence.exe
          generate_release_notes: true
